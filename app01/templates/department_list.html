{% extends "extend.html" %}

{% block context %}
    <div class="container">
        <a href="/department/add/" type="button" class="btn btn-success" style="margin-bottom: 10px ">新建</a>
    </div>

    <div class="container">
        <div class="panel panel-default">
            <div class="panel-heading">
                <h3 class="panel-title">
                    <span class="glyphicon glyphicon-th-list" aria-hidden="true" style="margin-right: 5px"></span>部门列表
                </h3>
            </div>
            <div class="panel-body">
                <table class="table table-bordered">
                    <thead>
                    <tr>
                        <th>id</th>
                        <th>部门</th>
                        <th>操作</th>
                    </tr>
                    </thead>
                    <tbody>
                    {% for i in queryset %}
                        <tr>
                            <td>{{ i.id }}</td>
                            <td>{{ i.title }}</td>
                            <td>
                                <a class="btn btn-primary btn-xs" href="/department/{{ i.id }}/edit/">编辑</a>
                                <a class="btn btn-danger btn-xs" href="/department/delete/?nid={{ i.id }}">删除</a>
                            </td>
                        </tr>
                    {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
{% endblock %}
