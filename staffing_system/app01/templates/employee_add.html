{% extends 'extend.html' %}
{% block add %}
    <div class="container">
        <div class="panel panel-default">
            <div class="panel-heading">
                <h3 class="panel-title">新建用户</h3>
            </div>
            <div class="panel-body">
                <form method="POST">
                    {% csrf_token %}
                    <div class="form-group">
                        姓名
                        <input name="user" type="text" class="form-control" id="" placeholder="姓名">
                    </div>
                    <div class="form-group">
                        密码
                        <input name="psw" type="password" class="form-control" id="" placeholder="密码">
                    </div>
                    <div class="form-group">
                        年龄
                        <input name="age" type="text" class="form-control" id="" placeholder="年龄">
                    </div>

                    <div class="form-group">
                        余额
                        <input name="ac" type="text" class="form-control" id="" placeholder="余额">
                    </div>
                    <div class="form-group">
                        入职时间
                        <input name="ctime" type="text" class="form-control" id="" placeholder="入职时间">
                    </div>
                    <div class="form-group">性别
                        <select class="form-control" id="" name="gender">
                            <option value="1" >男</option>
                            <option value="2" >女</option>
                        </select>
                    </div>
                    <div class="form-group">
                        部门
                        <select name="dep" class="form-control" id="">
                        {% for i in queryset %}
                            <option value="{{ i.id }}">{{ i.title }}</option>
                        {% endfor %}
                        </select>
                    </div>
                    <button type="submit" class="btn btn-success">提交</button>
                </form>
            </div>
        </div>
    </div>
{% endblock %}
